# Cloudflare Workers 配置（已从 Pages 迁移到 Workers）
name = "flowtica"
main = "dist/server/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = [ "nodejs_compat" ]

[assets]
directory = "./dist/client"

# 环境变量在 Cloudflare Dashboard → Workers → Settings → Variables 中配置
# 本地开发可创建 .dev.vars 文件（格式同 .env）
